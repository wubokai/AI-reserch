services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  redis:
    restart: unless-stopped

  analytics:
    restart: unless-stopped
    environment:
      ANALYTICS_ENVIRONMENT: production

  api:
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      DATA_MODE: REAL
      DEMO_PRINCIPAL_ENABLED: "false"
      SERVICE_JWT_ENABLED: "true"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SERVICE_JWT_HMAC_SECRET: ${SERVICE_JWT_HMAC_SECRET:?SERVICE_JWT_HMAC_SECRET is required}
      OPENAI_SAFETY_HMAC_SECRET: ${OPENAI_SAFETY_HMAC_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:?TIINGO_API_KEY is required}
      FRED_API_KEY: ${FRED_API_KEY:?FRED_API_KEY is required}

  web:
    restart: unless-stopped
    environment:
      DATA_MODE: REAL
      SERVICE_JWT_HMAC_SECRET: ${SERVICE_JWT_HMAC_SECRET:?SERVICE_JWT_HMAC_SECRET is required}
      SERVICE_JWT_EMAIL: ${SERVICE_JWT_EMAIL:?SERVICE_JWT_EMAIL is required}
