name: ai-quant-research-assistant

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant_research}
      POSTGRES_USER: ${POSTGRES_USER:-quant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [quant_internal]

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [quant_internal]

  analytics:
    image: ai-quant-research-assistant-analytics:local
    build:
      context: ./apps/analytics
    environment:
      ANALYTICS_ENVIRONMENT: ${APP_ENV:-development}
      ANALYTICS_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANALYTICS_SERVICE_NAME: analytics
    ports:
      - "127.0.0.1:8000:8000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/analytics/v1/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [quant_internal]

  api:
    image: ai-quant-research-assistant-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-development}
      DATA_MODE: ${DATA_MODE:-MOCK}
      APP_VERSION: ${SERVICE_VERSION:-0.1.0}
      DEMO_PRINCIPAL_ENABLED: ${DEMO_PRINCIPAL_ENABLED:-true}
      DEMO_PRINCIPAL_USERNAME: ${DEMO_PRINCIPAL_USERNAME:-demo}
      DEMO_PRINCIPAL_PASSWORD: ${DEMO_PRINCIPAL_PASSWORD:-change_me_demo_only}
      SERVICE_JWT_ENABLED: ${SERVICE_JWT_ENABLED:-false}
      SERVICE_JWT_ISSUER: ${SERVICE_JWT_ISSUER:-ai-quant-web}
      SERVICE_JWT_AUDIENCE: ${SERVICE_JWT_AUDIENCE:-ai-quant-api}
      SERVICE_JWT_SUBJECT: ${SERVICE_JWT_SUBJECT:-primary-owner}
      SERVICE_JWT_EMAIL: ${SERVICE_JWT_EMAIL:-bw2754@nyu.edu}
      SERVICE_JWT_HMAC_SECRET: ${SERVICE_JWT_HMAC_SECRET:-}
      SERVICE_JWT_TOKEN_TTL: ${SERVICE_JWT_TOKEN_TTL:-60s}
      ANALYTICS_INTERNAL_BASE_URL: http://analytics:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_REPORT_MODEL: ${OPENAI_REPORT_MODEL:-${OPENAI_MODEL:-}}
      OPENAI_VALIDATION_MODEL: ${OPENAI_VALIDATION_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-45s}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-12000}
      FILING_DATA_PROVIDER: ${FILING_DATA_PROVIDER:-mock}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
      SEC_TIMEOUT: ${SEC_TIMEOUT:-20s}
      SEC_MAX_REQUESTS_PER_SECOND: ${SEC_MAX_REQUESTS_PER_SECOND:-8}
      SEC_MAX_FILINGS: ${SEC_MAX_FILINGS:-6}
      SEC_MAX_JSON_BYTES: ${SEC_MAX_JSON_BYTES:-10000000}
      SEC_MAX_FILING_BYTES: ${SEC_MAX_FILING_BYTES:-20000000}
      SEC_MAX_ATTEMPTS: ${SEC_MAX_ATTEMPTS:-3}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-mock}
      MARKET_DATA_LICENSE_CONFIRMED: ${MARKET_DATA_LICENSE_CONFIRMED:-false}
      MARKET_DATA_LICENSE_POLICY_VERSION: ${MARKET_DATA_LICENSE_POLICY_VERSION:-}
      TIINGO_BASE_URL: ${TIINGO_BASE_URL:-https://api.tiingo.com}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-${MARKET_DATA_API_KEY:-}}
      TIINGO_USER_AGENT: ${TIINGO_USER_AGENT:-AI Quant Research Assistant}
      TIINGO_TIMEOUT: ${TIINGO_TIMEOUT:-20s}
      TIINGO_MAX_RESPONSE_BYTES: ${TIINGO_MAX_RESPONSE_BYTES:-10000000}
      TIINGO_MAX_ATTEMPTS: ${TIINGO_MAX_ATTEMPTS:-3}
      FUNDAMENTAL_DATA_PROVIDER: ${FUNDAMENTAL_DATA_PROVIDER:-mock}
      MACRO_DATA_PROVIDER: ${MACRO_DATA_PROVIDER:-mock}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRED_USER_AGENT: ${FRED_USER_AGENT:-AI Quant Research Assistant}
      FRED_SERIES_IDS: ${FRED_SERIES_IDS:-DFF,CPIAUCSL}
      FRED_OBSERVATION_START: ${FRED_OBSERVATION_START:-2015-01-01}
      FRED_TIMEOUT: ${FRED_TIMEOUT:-20s}
      FRED_MAX_OBSERVATIONS: ${FRED_MAX_OBSERVATIONS:-10000}
      FRED_MAX_RESPONSE_BYTES: ${FRED_MAX_RESPONSE_BYTES:-5000000}
      FRED_MAX_REQUESTS_PER_SECOND: ${FRED_MAX_REQUESTS_PER_SECOND:-2}
      FRED_MAX_ATTEMPTS: ${FRED_MAX_ATTEMPTS:-3}
      PROVIDER_CACHE_TTL: ${PROVIDER_CACHE_TTL:-6h}
      PROVIDER_MAX_CACHE_ENTRY_BYTES: ${PROVIDER_MAX_CACHE_ENTRY_BYTES:-5000000}
      OPENAI_MAX_INPUT_BYTES: ${OPENAI_MAX_INPUT_BYTES:-500000}
      OPENAI_MAX_TOOL_OUTPUT_BYTES: ${OPENAI_MAX_TOOL_OUTPUT_BYTES:-32768}
      OPENAI_MAX_TOOL_ROUNDS: ${OPENAI_MAX_TOOL_ROUNDS:-3}
      OPENAI_BUDGET_RESERVATION_TTL: ${OPENAI_BUDGET_RESERVATION_TTL:-3m}
      OPENAI_ALLOW_SAFE_FALLBACK: ${OPENAI_ALLOW_SAFE_FALLBACK:-true}
      OPENAI_SAFETY_HMAC_SECRET: ${OPENAI_SAFETY_HMAC_SECRET:-}
      OPENAI_REPORT_PROMPT_VERSION: ${OPENAI_REPORT_PROMPT_VERSION:-report_prompt_v1}
      OPENAI_REPORT_SCHEMA_VERSION: ${OPENAI_REPORT_SCHEMA_VERSION:-research_report_v1}
      OPENAI_INPUT_USD_PER_MILLION_TOKENS: ${OPENAI_INPUT_USD_PER_MILLION_TOKENS:-}
      OPENAI_CACHED_INPUT_USD_PER_MILLION_TOKENS: ${OPENAI_CACHED_INPUT_USD_PER_MILLION_TOKENS:-}
      OPENAI_OUTPUT_USD_PER_MILLION_TOKENS: ${OPENAI_OUTPUT_USD_PER_MILLION_TOKENS:-}
      OPENAI_PRICING_VERSION: ${OPENAI_PRICING_VERSION:-}
      OPENAI_PRICING_EFFECTIVE_FROM: ${OPENAI_PRICING_EFFECTIVE_FROM:-}
      RESEARCH_MAX_LLM_COST_USD: ${RESEARCH_MAX_LLM_COST_USD:-1.00}
      RESEARCH_MAX_LLM_CALLS: ${RESEARCH_MAX_LLM_CALLS:-10}
      RESEARCH_WORKER_ENABLED: ${RESEARCH_WORKER_ENABLED:-true}
      RESEARCH_WORKER_ID: ${RESEARCH_WORKER_ID:-api-worker-1}
      RESEARCH_WORKER_CONCURRENCY: ${RESEARCH_WORKER_CONCURRENCY:-2}
      RESEARCH_WORKER_POLL_DELAY: ${RESEARCH_WORKER_POLL_DELAY:-250ms}
      RESEARCH_WORKER_HEARTBEAT_DELAY: ${RESEARCH_WORKER_HEARTBEAT_DELAY:-10s}
      RESEARCH_WORKER_REAPER_DELAY: ${RESEARCH_WORKER_REAPER_DELAY:-15s}
      RESEARCH_WORKER_LEASE_DURATION: ${RESEARCH_WORKER_LEASE_DURATION:-60s}
      RESEARCH_MAX_EXECUTION_MINUTES: ${RESEARCH_MAX_EXECUTION_MINUTES:-15}
      RESEARCH_WORKER_RETRY_BASE_DELAY_SECONDS: ${RESEARCH_WORKER_RETRY_BASE_DELAY_SECONDS:-1}
      RESEARCH_WORKER_RETRY_MAX_DELAY_SECONDS: ${RESEARCH_WORKER_RETRY_MAX_DELAY_SECONDS:-30}
      OUTBOX_RELAY_ENABLED: ${OUTBOX_RELAY_ENABLED:-true}
      OUTBOX_RELAY_DELAY: ${OUTBOX_RELAY_DELAY:-1s}
      OUTBOX_RELAY_INITIAL_DELAY: ${OUTBOX_RELAY_INITIAL_DELAY:-2s}
      OUTBOX_RELAY_BATCH_SIZE: ${OUTBOX_RELAY_BATCH_SIZE:-100}
      RETENTION_ENABLED: ${RETENTION_ENABLED:-false}
      RESEARCH_ARTIFACT_RETENTION_DAYS: ${RESEARCH_ARTIFACT_RETENTION_DAYS:-1095}
      PROVIDER_RAW_RETENTION_DAYS: ${PROVIDER_RAW_RETENTION_DAYS:-365}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-90}
      RETENTION_BATCH_SIZE: ${RETENTION_BATCH_SIZE:-100}
      RETENTION_INITIAL_DELAY: ${RETENTION_INITIAL_DELAY:-10m}
      RETENTION_SWEEP_DELAY: ${RETENTION_SWEEP_DELAY:-24h}
      REPORT_MAX_PDF_BYTES: ${REPORT_MAX_PDF_BYTES:-26214400}
      REPORT_MAX_PDF_PAGES: ${REPORT_MAX_PDF_PAGES:-200}
      REPORT_MAX_FONT_BYTES: ${REPORT_MAX_FONT_BYTES:-52428800}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-quant_research}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-quant_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    healthcheck:
      # The public health contract treats Redis as non-critical and returns 200/DEGRADED;
      # PostgreSQL or durable-queue failures still return 503/DOWN.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks: [quant_internal]

  web:
    image: ai-quant-research-assistant-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      API_INTERNAL_BASE_URL: http://api:8080
      ANALYTICS_INTERNAL_BASE_URL: http://analytics:8000
      API_DEMO_USERNAME: ${DEMO_PRINCIPAL_USERNAME:-demo}
      API_DEMO_PASSWORD: ${DEMO_PRINCIPAL_PASSWORD:-change_me_demo_only}
      SERVICE_JWT_ISSUER: ${SERVICE_JWT_ISSUER:-ai-quant-web}
      SERVICE_JWT_AUDIENCE: ${SERVICE_JWT_AUDIENCE:-ai-quant-api}
      SERVICE_JWT_SUBJECT: ${SERVICE_JWT_SUBJECT:-primary-owner}
      SERVICE_JWT_EMAIL: ${SERVICE_JWT_EMAIL:-bw2754@nyu.edu}
      SERVICE_JWT_HMAC_SECRET: ${SERVICE_JWT_HMAC_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: [quant_internal]

volumes:
  postgres_data:
  redis_data:

networks:
  quant_internal:
    driver: bridge
