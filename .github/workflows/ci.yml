name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: pnpm lint:web
      - run: pnpm typecheck:web
      - run: pnpm test:web
      - run: pnpm build:web
      - run: pnpm --filter @ai-quant/web exec playwright install --with-deps chromium
      - run: pnpm e2e:web

  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/analytics/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e 'apps/analytics[dev]'
      - run: python -m pip install pip-audit==2.10.1
      - run: pip-audit --local
      - run: ruff check .
        working-directory: apps/analytics
      - run: ruff format --check .
        working-directory: apps/analytics
      - run: mypy src tests
        working-directory: apps/analytics
      - run: pytest
        working-directory: apps/analytics

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw --batch-mode --no-transfer-progress verify
        working-directory: apps/api

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [web, analytics, api]
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config
      - run: docker compose build
      - name: Scan application images and block fixable critical vulnerabilities
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/anchore/grype/releases/download/v0.112.0/grype_0.112.0_linux_amd64.tar.gz \
            --output /tmp/grype.tar.gz
          echo 'acb14a030010fe9bdb9594b4ae108d9d14ef2f926d936aa0916dc62c89c058ea  /tmp/grype.tar.gz' \
            | sha256sum --check
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          for service in web api analytics; do
            image_id="$(docker compose images --quiet "$service")"
            /tmp/grype "$image_id" --only-fixed --fail-on critical
          done
      - run: docker compose up -d
      - name: Phase 3 closed-loop smoke
        run: ./scripts/smoke-test.sh
        env:
          PHASE3_CLOSED_LOOP_SMOKE: "true"
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down -v

  container-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --format json > /tmp/compose.json
      - name: Verify application containers are least privilege
        run: |
          python3 - <<'PY'
          import json

          with open('/tmp/compose.json', encoding='utf-8') as handle:
              compose = json.load(handle)
          for name in ('web', 'api', 'analytics'):
              service = compose['services'][name]
              assert service.get('read_only') is True, (name, service)
              assert 'ALL' in service.get('cap_drop', []), (name, service)
              assert 'no-new-privileges:true' in service.get('security_opt', []), (name, service)
              assert service.get('pids_limit', 0) > 0, (name, service)
          PY

  secret-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/check-no-secrets.sh
