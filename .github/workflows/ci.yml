name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:web
      - run: pnpm typecheck:web
      - run: pnpm test:web
      - run: pnpm build:web
      - run: pnpm --filter @ai-quant/web exec playwright install --with-deps chromium
      - run: pnpm e2e:web

  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/analytics/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e 'apps/analytics[dev]'
      - run: ruff check .
        working-directory: apps/analytics
      - run: ruff format --check .
        working-directory: apps/analytics
      - run: mypy src tests
        working-directory: apps/analytics
      - run: pytest
        working-directory: apps/analytics

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw --batch-mode --no-transfer-progress verify
        working-directory: apps/api

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [web, analytics, api]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build
      - run: docker compose up -d
      - run: ./scripts/smoke-test.sh
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down -v

  secret-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-no-secrets.sh
