server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: ai-quant-research-api
  lifecycle:
    timeout-per-shutdown-phase: 20s
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_quant_research}
    username: ${POSTGRES_USER:ai_quant}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 5000
      validation-timeout: 2000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

app:
  service-name: ${spring.application.name}
  version: ${APP_VERSION:0.1.0-SNAPSHOT}
  data-mode: ${DATA_MODE:MOCK}
  security:
    demo-principal:
      enabled: false
      username: ""
      password: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 250ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true

logging:
  level:
    root: INFO
    com.aiquantresearch.api: INFO
  structured:
    format:
      console: logstash
