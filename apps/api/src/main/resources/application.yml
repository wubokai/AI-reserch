server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: ai-quant-research-api
  lifecycle:
    timeout-per-shutdown-phase: 20s
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_quant_research}
    username: ${POSTGRES_USER:ai_quant}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 5000
      validation-timeout: 2000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

app:
  service-name: ${spring.application.name}
  version: ${APP_VERSION:0.1.0-SNAPSHOT}
  data-mode: ${DATA_MODE:MOCK}
  analytics:
    base-url: ${ANALYTICS_INTERNAL_BASE_URL:http://localhost:8000}
    timeout: ${ANALYTICS_TIMEOUT:15s}
  llm:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    timeout: ${OPENAI_TIMEOUT:45s}
    api-key: ${OPENAI_API_KEY:}
    report-model: ${OPENAI_REPORT_MODEL:}
    validation-model: ${OPENAI_VALIDATION_MODEL:}
    reasoning-effort: ${OPENAI_REASONING_EFFORT:low}
    max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:12000}
    max-input-bytes: ${OPENAI_MAX_INPUT_BYTES:500000}
    max-tool-rounds: ${OPENAI_MAX_TOOL_ROUNDS:3}
    reservation-ttl: ${OPENAI_BUDGET_RESERVATION_TTL:3m}
    allow-safe-fallback: ${OPENAI_ALLOW_SAFE_FALLBACK:true}
    safety-hmac-secret: ${OPENAI_SAFETY_HMAC_SECRET:}
    prompt-version: ${OPENAI_REPORT_PROMPT_VERSION:report_prompt_v1}
    schema-version: ${OPENAI_REPORT_SCHEMA_VERSION:research_report_v1}
    max-cost-usd: ${RESEARCH_MAX_LLM_COST_USD:1.00}
    max-calls: ${RESEARCH_MAX_LLM_CALLS:10}
    pricing-version: ${OPENAI_PRICING_VERSION:}
    pricing-effective-from: ${OPENAI_PRICING_EFFECTIVE_FROM:}
    input-usd-per-million-tokens: ${OPENAI_INPUT_USD_PER_MILLION_TOKENS:}
    cached-input-usd-per-million-tokens: ${OPENAI_CACHED_INPUT_USD_PER_MILLION_TOKENS:}
    output-usd-per-million-tokens: ${OPENAI_OUTPUT_USD_PER_MILLION_TOKENS:}
  worker:
    enabled: ${RESEARCH_WORKER_ENABLED:true}
    worker-id: ${RESEARCH_WORKER_ID:api-worker-1}
    concurrency: ${RESEARCH_WORKER_CONCURRENCY:2}
    poll-delay: ${RESEARCH_WORKER_POLL_DELAY:250ms}
    heartbeat-delay: ${RESEARCH_WORKER_HEARTBEAT_DELAY:10s}
    reaper-delay: ${RESEARCH_WORKER_REAPER_DELAY:15s}
    lease-duration: ${RESEARCH_WORKER_LEASE_DURATION:60s}
    retry-base-delay-seconds: ${RESEARCH_WORKER_RETRY_BASE_DELAY_SECONDS:1}
    retry-max-delay-seconds: ${RESEARCH_WORKER_RETRY_MAX_DELAY_SECONDS:30}
  security:
    demo-principal:
      enabled: false
      username: ""
      password: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 250ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true

logging:
  level:
    root: INFO
    com.aiquantresearch.api: INFO
  structured:
    format:
      console: logstash
