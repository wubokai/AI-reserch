        probability:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        revenueGrowth:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        targetEbitdaMargin:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        evToEbitdaMultiple:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        impliedEquityValue:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        impliedPrice:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        upsideDownside:
