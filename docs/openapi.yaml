          minimum: 0
        rateLimit:
          $ref: '#/components/schemas/RateLimitStatus'
        message:
          type: [string, 'null']

    ProviderStatusResponse:
      type: object
      additionalProperties: false
      required: [status, dataMode, providers, checkedAt]
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        dataMode:
          $ref: '#/components/schemas/DataMode'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderStatus'
        checkedAt:
          type: string
          format: date-time

    HealthComponent:
      type: object
      additionalProperties: false
      required: [status, critical]
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        critical:
          type: boolean
        latencyMs:
          type: [integer, 'null']
          minimum: 0
        message:
          type: [string, 'null']

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, version, dataMode, timestamp, components]
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        version:
          type: string
        dataMode:
          $ref: '#/components/schemas/DataMode'
        timestamp:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/HealthComponent'

    Warning:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        evidenceIds:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^ev_[A-Za-z0-9_-]{1,64}$'

    ErrorSummary:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        failedStep:
          oneOf:
            - $ref: '#/components/schemas/StepType'
            - type: 'null'

    ApiError:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - timestamp
        - status
        - code
        - message
        - requestId
        - researchId
        - retryable
        - details
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]+$'
        message:
          type: string
        requestId:
          type: string
        researchId:
          type: [string, 'null']
          format: uuid
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
