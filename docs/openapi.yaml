        last:
          type: boolean

    ResearchPage:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResearchItem'
        page:
          $ref: '#/components/schemas/PageMetadata'

    Claim:
      type: object
      additionalProperties: false
      required:
        - id
        - statement
        - claimType
        - materiality
        - evidenceIds
        - calculationIds
        - numericReferences
        - dateReferences
        - confidence
        - limitations
      properties:
        id:
          type: string
          pattern: '^cl_[A-Za-z0-9_-]{1,64}$'
        statement:
          type: string
          minLength: 1
          maxLength: 1200
        claimType:
          $ref: '#/components/schemas/ClaimType'
        materiality:
          $ref: '#/components/schemas/ClaimMateriality'
        evidenceIds:
          type: array
          minItems: 1
          maxItems: 12
          uniqueItems: true
          items:
            type: string
            pattern: '^ev_[A-Za-z0-9_-]{1,64}$'
        calculationIds:
          type: array
          maxItems: 12
          uniqueItems: true
          items:
            type: string
            pattern: '^calc_[A-Za-z0-9_-]{1,64}$'
        numericReferences:
          type: array
          maxItems: 24
          items:
            $ref: '#/components/schemas/NumericReference'
        dateReferences:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/DateReference'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Support level for this Claim based on its linked Evidence and Calculations.
        limitations:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 500
        validationStatus:
          $ref: '#/components/schemas/ValidationStatus'
        validationNotes:
          type: array
          items:
            type: string

    NumericReference:
      type: object
      additionalProperties: false
      required:
