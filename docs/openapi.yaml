          pattern: '^calc_[A-Za-z0-9_-]{1,64}$'
        scenarios:
          type: array
          minItems: 3
          maxItems: 3
          uniqueItems: true
          description: Exactly one BULL, one BASE, and one BEAR scenario.
          items:
            $ref: '#/components/schemas/ScenarioResult'
          allOf:
            - contains:
                type: object
                required: [name]
                properties:
                  name:
                    const: BULL
              minContains: 1
              maxContains: 1
            - contains:
                type: object
                required: [name]
                properties:
                  name:
                    const: BASE
              minContains: 1
              maxContains: 1
            - contains:
                type: object
                required: [name]
                properties:
                  name:
                    const: BEAR
              minContains: 1
              maxContains: 1
