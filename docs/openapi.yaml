        - sourceId
        - jsonPointer
        - tolerance
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 100
        normalizedValue:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]+)?$'
        unit:
          type: string
          minLength: 1
          maxLength: 32
        sourceKind:
          type: string
          enum: [EVIDENCE, CALCULATION]
        sourceId:
          type: string
          minLength: 1
          maxLength: 100
        jsonPointer:
          type: string
          minLength: 1
          maxLength: 300
        tolerance:
          type: string
          pattern: '^[0-9]+(?:\.[0-9]+)?$'

    DateReference:
      type: object
      additionalProperties: false
      required: [token, normalizedDate, sourceKind, sourceId, jsonPointer]
      properties:
        token:
          type: string
          format: date
        normalizedDate:
          type: string
          format: date
        sourceKind:
          type: string
          enum: [EVIDENCE, CALCULATION]
        sourceId:
          type: string
          minLength: 1
          maxLength: 100
        jsonPointer:
          type: string
          minLength: 1
          maxLength: 300

    Evidence:
      type: object
      additionalProperties: false
      required:
        - evidenceId
        - evidenceType
        - title
        - summary
        - sourceName
        - sourceType
        - retrievedAt
        - isPrimarySource
        - freshnessStatus
        - qualityScore
        - rawDataHash
        - isDemoData
        - relatedClaimIds
      properties:
        evidenceId:
          type: string
          pattern: '^ev_[A-Za-z0-9_-]{1,64}$'
        evidenceType:
          $ref: '#/components/schemas/EvidenceType'
        title:
          type: string
        summary:
          type: string
        value:
          description: Typed JSON value copied from or derived from the source
        unit:
          type: [string, 'null']
        sourceName:
          type: string
        sourceUrl:
          type: [string, 'null']
          format: uri
        sourceType:
          $ref: '#/components/schemas/SourceType'
        publishedAt:
          type: [string, 'null']
          format: date-time
        retrievedAt:
          type: string
          format: date-time
        effectiveDate:
          type: [string, 'null']
          format: date
        isPrimarySource:
          type: boolean
        freshnessStatus:
          $ref: '#/components/schemas/FreshnessStatus'
        qualityScore:
          type: number
          minimum: 0
          maximum: 1
          description: Source/record quality only; this is not Claim support confidence.
        rawDataHash:
          type: string
          description: Lowercase SHA-256 hex digest of canonical source content
          pattern: '^[a-f0-9]{64}$'
        isDemoData:
          type: boolean
        relatedClaimIds:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^cl_[A-Za-z0-9_-]{1,64}$'
        sourceSnapshotId:
          type: [string, 'null']
          format: uuid
        sourceSchemaVersion:
          type: [string, 'null']
        normalizedDataHash:
          type: [string, 'null']
          pattern: '^[a-f0-9]{64}$'

