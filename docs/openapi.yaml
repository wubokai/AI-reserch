openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: AI Quant Research Assistant API
  version: 1.0.0
  summary: Asynchronous, evidence-backed US equity research API
  description: |
    Public contract for the Java orchestration service. All financial facts must be
    traceable to registered evidence. Phase 3 ordinary research is deterministic
    MOCK DATA ONLY and supports target symbols MU, NVDA, and RKLB with SPY or QQQ as
    the benchmark. Mock research is marked as MOCK; the UI and every export render
    DEMO DATA - NOT REAL MARKET DATA. MIXED_TEST is test-only and cannot be published
    or exported through ordinary user flows. Basic authentication is available only
    through an explicitly enabled development/test demo principal. Bearer
    authentication remains the production contract but is not activated until formal
    auth integration is delivered; the production profile therefore fails closed.
  contact:
    name: AI Quant Research Assistant maintainers
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Research
    description: Asynchronous research lifecycle
  - name: Reports
    description: Immutable report versions and exports
  - name: Evidence
    description: Evidence registry for a research job
  - name: Securities
    description: Supported security discovery
  - name: Providers
    description: Sanitized data-provider status
  - name: Health
    description: Service health
security:
  - bearerAuth: []
  - basicDemoAuth: []
paths:
  /api/v1/research:
    post:
      tags: [Research]
      operationId: createResearch
      summary: Create and enqueue a research job
      description: |
        Phase 3 accepts only MU, NVDA, or RKLB as the target; SPY and QQQ are
        benchmark-only. The fixed contract is STANDARD/5y with technical analysis
        enabled. Requests outside that boundary return INVALID_REQUEST before a job
        is created. A locally provable symbol/company-name contradiction returns
        SECURITY_MISMATCH. The request thread does not perform network resolution.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResearchRequest'
            examples:
              muResearch:
                value:
                  query: 分析 MU 未来 12 个月的主要增长动力和风险
                  symbol: MU
                  locale: zh-CN
                  benchmark: QQQ
                  period: 5y
                  reportDepth: STANDARD
                  includeTechnicalAnalysis: true
                  includeFundamentalAnalysis: true
                  includeMacroAnalysis: true
      responses:
        '202':
          description: Research job accepted and queued
          headers:
            Location:
              description: Canonical URL of the created research job
              schema:
                type: string
            Retry-After:
              description: Suggested status polling delay in seconds
              schema:
                type: integer
                minimum: 1
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      tags: [Research]
      operationId: listResearch
      summary: List visible research jobs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: symbol
          in: query
          description: Exact, case-insensitive ticker symbol
          schema:
            type: string
            pattern: '^[A-Za-z][A-Za-z0-9.-]{0,9}$'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ResearchStatus'
        - name: from
          in: query
          description: Include jobs created on or after this UTC instant
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Include jobs created before this UTC instant
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Search title, query, symbol, or company name
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - createdAt,desc
              - createdAt,asc
              - updatedAt,desc
              - updatedAt,asc
            default: createdAt,desc
        - $ref: '#/components/parameters/XRequestId'
      responses:
        '200':
          description: Paginated research jobs; soft-deleted jobs are excluded
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/research/{researchId}:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Research]
      operationId: getResearch
      summary: Get research details and the latest report, if available
      responses:
        '200':
          description: Research details
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Research]
      operationId: deleteResearch
      summary: Soft-delete a research job
      description: |
        Hides the research job from normal reads. Audit records, source snapshots,
        evidence and report versions are retained according to the retention policy.
        Repeated deletion is successful and returns 204.
      responses:
        '204':
          description: Research job is now soft-deleted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/research/{researchId}/status:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Research]
      operationId: getResearchStatus
      summary: Get research progress and step attempts
      responses:
        '200':
          description: Current status snapshot
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/research/{researchId}/retry:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/XRequestId'
    post:
      tags: [Research]
      operationId: retryResearch
      summary: Resume a failed or partially completed research job
      description: |
        Only FAILED or PARTIALLY_COMPLETED research may be retried. Successful steps
        with unchanged input/implementation hashes are reused, historical attempts
        and immutable report versions are retained, and execution resumes from the
        first eligible failed or incomplete step. fromStep cannot skip dependencies.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryResearchRequest'
      responses:
        '202':
          description: Retry accepted
          headers:
            Location:
              description: Status URL for this research job
              schema:
                type: string
            Retry-After:
              schema:
                type: integer
                minimum: 1
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/research/{researchId}/cancel:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/XRequestId'
    post:
      tags: [Research]
      operationId: cancelResearch
      summary: Request cooperative cancellation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelResearchRequest'
      responses:
        '202':
          description: |
            Cancellation request accepted. COMPLETED, PARTIALLY_COMPLETED, and
            CANCELLED are accepted no-ops returning the existing snapshot; FAILED
            returns 409 because retry/delete, not cancellation, is the valid action.
          headers:
            Location:
              description: Status URL for this research job
              schema:
                type: string
            Retry-After:
              schema:
                type: integer
                minimum: 1
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/research/{researchId}/evidence:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Evidence]
      operationId: listResearchEvidence
      summary: List evidence registered for a research job
      description: |
        Owner-scoped evidence includes stable evidence IDs, canonical content hashes,
        demo provenance, and related Claim IDs for reverse traceability.
      parameters:
        - name: claimType
          in: query
          schema:
            $ref: '#/components/schemas/ClaimType'
        - name: sourceType
          in: query
          schema:
            $ref: '#/components/schemas/SourceType'
        - name: freshnessStatus
          in: query
          schema:
            $ref: '#/components/schemas/FreshnessStatus'
        - name: isDemoData
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated evidence registry
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidencePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/research/{researchId}/reports:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Reports]
      operationId: listReportVersions
      summary: List immutable report versions newest first
      description: Returns only owner-visible published report versions.
      responses:
        '200':
          description: Paginated report version summaries
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportVersionPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/research/{researchId}/evidence/search:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Evidence]
      operationId: searchResearchEvidence
      summary: Search immutable filing chunks for a research job
      description: |
        Owner-scoped PostgreSQL full-text search. Results are untrusted source data
        and include an exact filing/section/chunk locator.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 10
      responses:
        '200':
          description: Ranked filing chunk matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/research/{researchId}/reports/{version}:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - name: version
        in: path
        required: true
        description: One-based report version
        schema:
          type: integer
          minimum: 1
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Reports]
      operationId: getReportVersion
      summary: Get an immutable report version
      description: Returns an owner-visible published report with its content hash as ETag.
      responses:
        '200':
          description: Full report version
          headers:
            ETag:
              description: Content hash for the immutable report version
              schema:
                type: string
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/research/{researchId}/export:
    parameters:
      - $ref: '#/components/parameters/ResearchId'
      - name: format
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ExportFormat'
        description: Defaults to pdf
      - name: reportVersion
        in: query
        required: false
        description: Defaults to the latest report version
        schema:
          type: integer
          minimum: 1
      - $ref: '#/components/parameters/XRequestId'
    get:
      tags: [Reports]
      operationId: exportResearchReport
      summary: Export the latest or a selected report version
      description: |
        Exports only an owner-visible published report. MIXED_TEST reports are blocked.
        MOCK exports always contain DEMO DATA - NOT REAL MARKET DATA. HTML contains no
        scripts or external resources; PDF rendering uses only local resources. Missing,
        unpublished, inaccessible, or unknown report versions return owner-scoped
        RESEARCH_NOT_FOUND. Renderer/cache verification failures return the retryable
        EXPORT_RENDER_FAILED code.
      responses:
        '200':
          description: Exported report bytes
          headers:
            Content-Disposition:
              description: Safe attachment filename
              schema:
                type: string
            ETag:
              description: Export content hash
              schema:
                type: string
            X-Report-Version:
              description: Exported report version
              schema:
                type: integer
            X-Data-Mode:
              description: Data mode of the exported report; MIXED_TEST is never exportable
              schema:
                $ref: '#/components/schemas/DataMode'
            X-Content-SHA256:
              description: Lowercase SHA-256 digest of the returned bytes
              schema:
                type: string
                pattern: '^[a-f0-9]{64}$'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            text/markdown:
              schema:
                type: string
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/securities/search:
    get:
      tags: [Securities]
      operationId: searchSecurities
      summary: Search supported US common stocks and ETFs
      parameters:
        - name: q
          in: query
          required: true
          description: Ticker or company-name prefix
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: securityType
          in: query
          schema:
            $ref: '#/components/schemas/SecurityType'
        - name: exchange
          in: query
          schema:
            type: string
            maxLength: 20
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - $ref: '#/components/parameters/XRequestId'
      responses:
        '200':
          description: Ranked security matches
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecuritySearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/providers/status:
    get:
      tags: [Providers]
      operationId: getProviderStatus
      summary: Get sanitized provider capabilities and health
      description: Credentials and credential fragments are never returned.
      parameters:
        - $ref: '#/components/parameters/XRequestId'
      responses:
        '200':
          description: Provider status snapshot
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Get API and critical dependency health
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
      responses:
        '200':
          description: Service is available; optional providers may be degraded
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: A critical dependency is unavailable
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Production authentication contract. Its implementation is intentionally
        deferred beyond Phase 3; production startup fails closed until it is delivered.
    basicDemoAuth:
      type: http
      scheme: basic
      description: |
        Explicit development/test demo principal only. It is rejected in production.

  parameters:
    ResearchId:
      name: researchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key scoped to authenticated user, method, and path. Reusing a key
        with a different request body returns IDEMPOTENCY_KEY_REUSED.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x21-\x7E]+$'
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
    Page:
      name: page
      in: query
      required: false
      description: Zero-based page number
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  headers:
    XRequestId:
      description: Request correlation identifier
      schema:
        type: string
    IdempotencyReplayed:
      description: True when the response was replayed from an earlier request
      schema:
        type: boolean

  responses:
    BadRequest:
      description: Request syntax or parameter validation failed
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication is missing or invalid
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Caller cannot access this resource or the account is not active
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Route/resource does not exist, is inaccessible, or is soft-deleted
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Current state conflicts with the requested operation
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnprocessableEntity:
      description: Request is syntactically valid but semantically invalid
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Local or upstream rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until retry is advised
          schema:
            type: integer
            minimum: 1
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ServiceUnavailable:
      description: A required service is temporarily unavailable
      headers:
        Retry-After:
          description: Seconds until retry is advised, when known
          schema:
            type: integer
            minimum: 1
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ResearchStatus:
      type: string
      enum:
        - CREATED
        - QUEUED
        - RESOLVING_SECURITY
        - FETCHING_MARKET_DATA
        - FETCHING_FUNDAMENTALS
        - FETCHING_FILINGS
        - FETCHING_MACRO_DATA
        - VALIDATING_DATA
        - RUNNING_QUANT_ANALYSIS
        - ANALYZING_FUNDAMENTALS
        - BUILDING_EVIDENCE
        - GENERATING_REPORT
        - VALIDATING_REPORT
        - COMPLETED
        - PARTIALLY_COMPLETED
        - FAILED
        - CANCELLED

    StepType:
      type: string
      enum:
        - RESOLVE_SECURITY
        - FETCH_MARKET_DATA
        - FETCH_FUNDAMENTALS
        - FETCH_FILINGS
        - FETCH_MACRO_DATA
        - VALIDATE_DATA
        - RUN_QUANT_ANALYSIS
        - ANALYZE_FUNDAMENTALS
        - BUILD_EVIDENCE
        - GENERATE_REPORT
        - VALIDATE_REPORT

    StepStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, SKIPPED, CANCELLED]

    ReportDepth:
      type: string
      enum: [QUICK, STANDARD, DEEP]
      default: STANDARD
      description: Phase 3 accepts STANDARD only; QUICK/DEEP return INVALID_REQUEST.

    ResearchPeriod:
      type: string
      enum: [1y, 3y, 5y, 10y, max]
      default: 5y
      description: Phase 3 accepts the deterministic 5y Mock fixture only; other values return INVALID_REQUEST.

    Locale:
      type: string
      enum: [zh-CN, en-US]

    DataMode:
      type: string
      description: |
        Phase 3 ordinary user research is MOCK. REAL is reserved for approved future
        providers. MOCK uses only deterministic mock data and must display
        DEMO DATA - NOT REAL MARKET DATA in the UI and every export.
        MIXED_TEST may mix real and mock inputs only in automated tests or fault
        drills and must never be published or exported through ordinary user flows.
      enum: [REAL, MOCK, MIXED_TEST]

    ClaimType:
      type: string
      enum: [FACT, CALCULATION, INFERENCE, OPINION]

    ClaimMateriality:
      type: string
      enum: [MATERIAL, SUPPORTING]

    EvidenceType:
      type: string
      enum:
        - MARKET_PRICE
        - FINANCIAL_METRIC
        - SEC_FILING
        - MACRO_OBSERVATION
        - QUANT_RESULT
        - COMPANY_PROFILE
        - NEWS_ARTICLE
        - OTHER

    SourceType:
      type: string
      enum:
        - EXCHANGE
        - MARKET_DATA_PROVIDER
        - COMPANY_FILING
        - SEC_FILING
        - GOVERNMENT_DATA
        - COMPANY_WEBSITE
        - NEWS
        - INTERNAL_CALCULATION
        - MOCK
        - OTHER

    FreshnessStatus:
      type: string
      enum: [FRESH, STALE, VERY_STALE, UNKNOWN]

    SecurityType:
      type: string
      enum: [COMMON_STOCK, ETF]

    ExportFormat:
      type: string
      enum: [pdf, markdown, html]
      default: pdf

    ValidationStatus:
      type: string
      enum: [PENDING, PASSED, PASSED_WITH_WARNINGS, FAILED]

    CreateResearchRequest:
      type: object
      additionalProperties: false
      required:
        - query
        - symbol
      properties:
        query:
          type: string
          minLength: 10
          maxLength: 4000
        symbol:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9.-]{0,9}$'
          description: Phase 3 target; case-insensitive MU, NVDA, or RKLB only.
        companyName:
          type: string
          minLength: 1
          maxLength: 200
          description: Optional cross-check; when supplied it must resolve to the target symbol.
        locale:
          allOf:
            - $ref: '#/components/schemas/Locale'
          description: Inferred from the query language when omitted.
        benchmark:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9.-]{0,9}$'
          default: SPY
          description: Phase 3 accepts case-insensitive SPY or QQQ only.
        period:
          allOf:
            - $ref: '#/components/schemas/ResearchPeriod'
          description: Must be 5y in Phase 3.
        startDate:
          type: string
          format: date
          description: Reserved for a later phase; any explicit date range is rejected in Phase 3.
        endDate:
          type: string
          format: date
          description: Reserved for a later phase; any explicit date range is rejected in Phase 3.
        reportDepth:
          allOf:
            - $ref: '#/components/schemas/ReportDepth'
          description: Must be STANDARD in Phase 3.
        includeTechnicalAnalysis:
          type: boolean
          const: true
          default: true
          description: Mandatory in Phase 3; false returns INVALID_REQUEST.
        includeFundamentalAnalysis:
          type: boolean
          default: true
          description: |
            False skips only the optional ANALYZE_FUNDAMENTALS narrative step.
            Normalized fundamentals are still fetched for mandatory scenarios, and
            the safe report is PARTIALLY_COMPLETED/PASSED_WITH_WARNINGS.
        includeMacroAnalysis:
          type: boolean
          default: true
          description: False skips FETCH_MACRO_DATA; a complete safe report may still be COMPLETED/PASSED.
      description: |
        Phase 3 deterministic Mock boundary: MU/NVDA/RKLB target, SPY/QQQ benchmark,
        STANDARD depth, fixed 5y period, and mandatory technical analysis. Requests
        outside this boundary fail before Research creation. dataMode is server-owned
        and fixed to MOCK for ordinary Phase 3 flows.

    RetryResearchRequest:
      type: object
      additionalProperties: false
      properties:
        fromStep:
          $ref: '#/components/schemas/StepType'
        reason:
          type: string
          maxLength: 500

    CancelResearchRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          maxLength: 500

    ResearchLinks:
      type: object
      additionalProperties: false
      required: [self, status]
      properties:
        self:
          type: string
        status:
          type: string
        evidence:
          type: string
        reports:
          type: string
        export:
          type: string

    ResearchAccepted:
      type: object
      additionalProperties: false
      required: [researchId, status, dataMode, createdAt, links]
      properties:
        researchId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ResearchStatus'
        dataMode:
          $ref: '#/components/schemas/DataMode'
        createdAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/ResearchLinks'

    ResearchItem:
      type: object
      required:
        - researchId
        - query
        - symbol
        - companyName
        - status
        - progress
        - reportDepth
        - dataMode
        - createdAt
        - updatedAt
      properties:
        researchId:
          type: string
          format: uuid
        title:
          type: [string, 'null']
        query:
          type: string
        symbol:
          type: [string, 'null']
        companyName:
          type: [string, 'null']
        benchmark:
          type: [string, 'null']
        status:
          $ref: '#/components/schemas/ResearchStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        reportDepth:
          $ref: '#/components/schemas/ReportDepth'
        dataMode:
          $ref: '#/components/schemas/DataMode'
        latestReportVersion:
          type: [integer, 'null']
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, 'null']
          format: date-time

    ResearchDetail:
      allOf:
        - $ref: '#/components/schemas/ResearchItem'
        - type: object
          required:
            - request
            - currentStep
            - cancellationRequested
            - warnings
            - links
          properties:
            request:
              $ref: '#/components/schemas/CreateResearchRequest'
            currentStep:
              type: [string, 'null']
            startedAt:
              type: [string, 'null']
              format: date-time
            cancellationRequested:
              type: boolean
            lastError:
              oneOf:
                - $ref: '#/components/schemas/ErrorSummary'
                - type: 'null'
            latestReport:
              oneOf:
                - $ref: '#/components/schemas/ReportVersion'
                - type: 'null'
            warnings:
              type: array
              items:
                $ref: '#/components/schemas/Warning'
            links:
              $ref: '#/components/schemas/ResearchLinks'
      unevaluatedProperties: false

    ResearchStep:
      type: object
      additionalProperties: false
      required:
        - step
        - status
        - attemptCount
        - retryable
      properties:
        step:
          $ref: '#/components/schemas/StepType'
        status:
          $ref: '#/components/schemas/StepStatus'
        attemptCount:
          type: integer
          minimum: 0
        startedAt:
          type: [string, 'null']
          format: date-time
        completedAt:
          type: [string, 'null']
          format: date-time
        durationMs:
          type: [integer, 'null']
          minimum: 0
        retryable:
          type: boolean
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorSummary'
            - type: 'null'

    ResearchStatusResponse:
      type: object
      additionalProperties: false
      required:
        - researchId
        - status
        - progress
        - completedSteps
        - totalSteps
        - cancellationRequested
        - dataMode
        - steps
        - updatedAt
      properties:
        researchId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ResearchStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        currentStep:
          type: [string, 'null']
        completedSteps:
          type: integer
          minimum: 0
        totalSteps:
          type: integer
          minimum: 1
        cancellationRequested:
          type: boolean
        dataMode:
          $ref: '#/components/schemas/DataMode'
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorSummary'
            - type: 'null'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ResearchStep'
        updatedAt:
          type: string
          format: date-time

    PageMetadata:
      type: object
      additionalProperties: false
      required: [number, size, totalElements, totalPages, first, last]
      properties:
        number:
